<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroPredict — Early White Matter Disease Risk Prediction</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    {% set path = request.url.path if request else "/" %}
    <header class="site-header">
        <a class="brand" href="/">
            <span class="brand-logo" aria-hidden="true">🧠</span>
            <span class="brand-text">
                <span class="brand-name">NeuroPredict</span>
                <span class="subtitle">Early White Matter Disease risk prediction — 3D&nbsp;CNN (research demo)</span>
            </span>
        </a>
        <nav class="site-nav">
            <a href="/" class="{{ 'active' if path == '/' else '' }}">Predict</a>
            <a href="/digitizer" class="{{ 'active' if path.startswith('/digitizer') else '' }}">Archive&nbsp;Digitizer</a>
            <a href="/performance" class="{{ 'active' if path.startswith('/performance') else '' }}">Model&nbsp;performance</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="disclaimer">
        <strong>Disclaimer:</strong> {{ disclaimer }}
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
